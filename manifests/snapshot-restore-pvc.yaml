apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{PVC_NAME}}
  namespace: {{PVC_NAMESPACE}}
spec:
  storageClassName: {{STORAGE_CLASS_NAME}}
  dataSource:
    name: {{SNAPSHOT_NAME}}
    kind: VolumeSnapshot
    apiGroup: snapshot.storage.k8s.io
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: {{STORAGE_SIZE}}